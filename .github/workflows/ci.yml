name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    # Postgres efímero para validar el build (incluye `prisma db push`).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mundial
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mundial?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/mundial?schema=public
      AUTH_SECRET: ci-secret-not-used-in-production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run engine tests
        run: npm test

      - name: Build (genera cliente, crea tablas y compila)
        run: npm run build
