name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: file:./ci.db
      AUTH_SECRET: ci-secret-not-used-in-production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create database schema
        run: npm run db:push

      - name: Run engine tests
        run: npm test

      - name: Build
        run: npm run build
